version: 1

runtime:
  db: sqlite
  defaultAdapter: hermes-local

gateway:
  host: "127.0.0.1"
  healthPath: "/health"

profiles:
  default:
    displayName: "AI-OS 主控"
    role: "主控调度专家"
    runtimeType: "hermes-local"
    enabled: true
    autoStart: true
    port: 8642
    model: "kimi/kimi-k2.5"
    entry:
      type: "aios-workspace"
      route: "aios"
      title: "AI-OS"
      icon: "layout-dashboard"
    capabilities:
