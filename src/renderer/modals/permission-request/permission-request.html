<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permission Request</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --danger-color: #ef4444;
      --success-color: #22c55e;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --border-color: #404040;
        --accent-color: #60a5fa;
        --accent-hover: #3b82f6;
        --danger-color: #f87171;
        --success-color: #4ade80;
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      flex: 1;
    }
    
    .title h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .title p {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .content {
      margin-bottom: 20px;
    }
    
    .permission-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--border-color);
    }
    
    .permission-icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .permission-info {
      flex: 1;
    }
    
    .permission-name {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
    }
    
    .permission-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    
    .origin {
      text-align: center;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }
    
    .origin-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .origin-url {
      font-size: 13px;
      font-family: monospace;
      color: var(--accent-color);
      word-break: break-all;
    }
    
    .buttons {
      display: flex;
      gap: 10px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-secondary {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--border-color);
    }
    
    .btn-primary {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-danger {
      background: var(--danger-color);
      color: white;
      border-color: var(--danger-color);
    }
    
    .btn-danger:hover {
      filter: brightness(1.1);
    }
    
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>
  </div>
  
  <script src="permission-request.ts"></script>
</body>
</html>
