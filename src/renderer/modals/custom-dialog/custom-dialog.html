<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-input: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --success-color: #22c55e;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-input: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --border-color: #404040;
        --accent-color: #60a5fa;
        --accent-hover: #3b82f6;
        --danger-color: #f87171;
        --warning-color: #fbbf24;
        --success-color: #4ade80;
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal {
      width: 100%;
      max-width: 440px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .icon.info { background: rgba(59, 130, 246, 0.1); }
    .icon.warning { background: rgba(245, 158, 11, 0.1); }
    .icon.error { background: rgba(239, 68, 68, 0.1); }
    .icon.success { background: rgba(34, 197, 94, 0.1); }
    .icon.question { background: rgba(139, 92, 246, 0.1); }
    
    .title {
      flex: 1;
    }
    
    .title h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .message {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    
    .details {
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    
    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    
    .input-group input:focus,
    .input-group textarea:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    
    .input-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-color);
    }
    
    .checkbox-group label {
      font-size: 14px;
      color: var(--text-primary);
    }
    
    .buttons {
      display: flex;
      gap: 10px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-secondary {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--border-color);
    }
    
    .btn-primary {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-danger {
      background: var(--danger-color);
      color: white;
      border-color: var(--danger-color);
    }
    
    .btn-danger:hover {
      filter: brightness(1.1);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>
  </div>
  
  <script src="custom-dialog.ts"></script>
</body>
</html>
